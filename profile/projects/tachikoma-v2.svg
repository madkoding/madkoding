<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#111927"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e04d39"/>
      <stop offset="100%" style="stop-color:#b71c1c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="320" rx="12" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
  </g>
  <g stroke="url(#accent)" stroke-width="1" opacity="0.5" fill="none" stroke-dasharray="4,4">
    <path d="M 60 90 L 200 90 L 210 100 L 350 100"/>
    <path d="M 60 130 L 190 130 L 200 120 L 340 120"/>
    <path d="M 60 170 L 210 170 L 220 180 L 360 180"/>
  </g>
  <g transform="translate(420, 160)">
    <rect x="-50" y="-50" width="100" height="100" rx="8" fill="#1a2332" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
    <ellipse cx="0" cy="-15" rx="25" ry="10" fill="none" stroke="#e04d39" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="#e04d39" stroke-width="1.5"/>
    <ellipse cx="0" cy="15" rx="25" ry="10" fill="none" stroke="#e04d39" stroke-width="1.5"/>
    <line x1="-25" y1="-15" x2="-25" y2="15" stroke="#e04d39" stroke-width="1.5"/>
    <line x1="25" y1="-15" x2="25" y2="15" stroke="#e04d39" stroke-width="1.5"/>
    <circle cx="0" cy="-15" r="3" fill="#e04d39" opacity="0.7"/>
    <circle cx="-10" cy="0" r="3" fill="#e04d39" opacity="0.7"/>
    <circle cx="10" cy="0" r="3" fill="#e04d39" opacity="0.7"/>
    <circle cx="0" cy="15" r="3" fill="#e04d39" opacity="0.7"/>
  </g>
  <g stroke="url(#accent)" stroke-width="1.5" opacity="0.6" fill="none">
    <line x1="470" y1="160" x2="560" y2="150"/>
    <line x1="470" y1="160" x2="560" y2="170"/>
  </g>
  <text x="400" y="55" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="20" font-weight="bold" filter="url(#glow)">Tachikoma</text>
  <text x="400" y="78" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">Distributed Logging System</text>
  <g transform="translate(400, 250)" text-anchor="middle">
    <rect x="-140" y="-15" width="80" height="28" rx="6" fill="#1a2332" stroke="#dea584" stroke-width="1"/>
    <text x="-100" y="4" fill="#dea584" font-family="monospace" font-size="11" font-weight="600">Rust</text>
    <rect x="-50" y="-15" width="70" height="28" rx="6" fill="#1a2332" stroke="#e04d39" stroke-width="1"/>
    <text x="-15" y="4" fill="#e04d39" font-family="monospace" font-size="11" font-weight="600">Axum</text>
    <rect x="30" y="-15" width="90" height="28" rx="6" fill="#1a2332" stroke="#94a3b8" stroke-width="1"/>
    <text x="75" y="4" fill="#94a3b8" font-family="monospace" font-size="11" font-weight="600">Search</text>
  </g>
  <circle cx="100" cy="90" r="3" fill="#e04d39" opacity="0.8"/>
  <circle cx="250" cy="100" r="3" fill="#e04d39" opacity="0.6"/>
  <circle cx="120" cy="130" r="3" fill="#e04d39" opacity="0.7"/>
  <circle cx="280" cy="120" r="3" fill="#e04d39" opacity="0.5"/>
  <circle cx="150" cy="170" r="3" fill="#e04d39" opacity="0.8"/>
  <circle cx="300" cy="180" r="3" fill="#e04d39" opacity="0.6"/>
</svg>
