<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#111927"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3ddc84"/>
      <stop offset="100%" style="stop-color:#00c853"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="320" rx="12" fill="url(#bg)"/>
  <g opacity="0.05" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
  </g>
  <!-- Android device -->
  <g transform="translate(150, 160)">
    <rect x="-45" y="-55" width="90" height="110" rx="8" fill="#1a2332" stroke="#3ddc84" stroke-width="2"/>
    <rect x="-38" y="-48" width="76" height="55" rx="4" fill="#0d121c"/>
    <path d="M 0 -25 Q -10 -35 -20 -25 M -7 -20 Q 0 -27 7 -20 M 0 -20 L 0 -20" stroke="#3ddc84" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-20" cy="35" r="6" fill="none" stroke="#3ddc84" stroke-width="1.5" opacity="0.5"/>
    <circle cx="20" cy="35" r="6" fill="none" stroke="#3ddc84" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Connection line -->
  <line x1="210" y1="160" x2="320" y2="160" stroke="#3ddc84" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <!-- ESP32 chip -->
  <g transform="translate(400, 160)">
    <rect x="-55" y="-55" width="110" height="110" rx="8" fill="#1a2332" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
    <g stroke="#5a6b7c" stroke-width="3">
      <line x1="-40" y1="-40" x2="-55" y2="-40"/>
      <line x1="-20" y1="-40" x2="-55" y2="-20"/>
      <line x1="0" y1="-40" x2="-55" y2="0"/>
      <line x1="20" y1="-40" x2="-55" y2="20"/>
      <line x1="40" y1="-40" x2="-55" y2="40"/>
      <line x1="-40" y1="40" x2="-55" y2="40"/>
      <line x1="-20" y1="40" x2="-55" y2="20"/>
      <line x1="0" y1="40" x2="-55" y2="0"/>
      <line x1="20" y1="40" x2="-55" y2="-20"/>
      <line x1="40" y1="40" x2="-55" y2="-40"/>
    </g>
    <text x="0" y="-5" text-anchor="middle" fill="#3ddc84" font-family="monospace" font-size="14" font-weight="bold">ESP32</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="9">WiFi Bridge</text>
    <circle cx="35" cy="35" r="4" fill="#3ddc84" opacity="0.8"/>
  </g>
  <!-- Connection line -->
  <line x1="460" y1="160" x2="520" y2="160" stroke="#3ddc84" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <!-- Car head unit -->
  <g transform="translate(650, 160)">
    <rect x="-70" y="-45" width="140" height="90" rx="8" fill="#1a2332" stroke="#5a6b7c" stroke-width="2"/>
    <rect x="-63" y="-38" width="126" height="65" rx="4" fill="#0d121c"/>
    <rect x="-52" y="-28" width="35" height="22" rx="3" fill="#1e293b" opacity="0.6"/>
    <rect x="-12" y="-28" width="35" height="22" rx="3" fill="#1e293b" opacity="0.6"/>
    <rect x="-52" y="-2" width="75" height="18" rx="3" fill="#1e293b" opacity="0.4"/>
    <path d="M 40 -10 Q 30 -20 20 -10 M 33 -6 Q 28 -11 23 -6 M 47 -6 Q 42 -11 37 -6" stroke="url(#accent)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="18" font-weight="bold" filter="url(#glow)">ESP32 Android Auto WiFi</text>
  <text x="400" y="73" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="11">IoT WiFi Bridge for Android Auto</text>
  <!-- Tech badges -->
  <g transform="translate(400, 250)" text-anchor="middle">
    <rect x="-120" y="-15" width="60" height="28" rx="6" fill="#1a2332" stroke="#3ddc84" stroke-width="1"/>
    <text x="-90" y="4" fill="#3ddc84" font-family="monospace" font-size="11" font-weight="600">C</text>
    <rect x="-50" y="-15" width="80" height="28" rx="6" fill="#1a2332" stroke="#00c853" stroke-width="1"/>
    <text x="-10" y="4" fill="#00c853" font-family="monospace" font-size="11" font-weight="600">ESP32</text>
    <rect x="40" y="-15" width="60" height="28" rx="6" fill="#1a2332" stroke="#94a3b8" stroke-width="1"/>
    <text x="70" y="4" fill="#94a3b8" font-family="monospace" font-size="11" font-weight="600">IoT</text>
  </g>
  <!-- Data particles -->
  <circle cx="240" cy="160" r="3" fill="#3ddc84" opacity="0.7"/>
  <circle cx="350" cy="160" r="3" fill="#3ddc84" opacity="0.6"/>
  <circle cx="490" cy="160" r="3" fill="#3ddc84" opacity="0.7"/>
  <circle cx="580" cy="160" r="3" fill="#3ddc84" opacity="0.5"/>
</svg>
