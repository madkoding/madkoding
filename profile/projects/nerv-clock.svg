<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#111927"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="nerv-orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
    <linearGradient id="nerv-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c80000"/>
      <stop offset="100%" style="stop-color:#ff0000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neo-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#00ff88" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="url(#bg)"/>

  <!-- NERV decorative corners -->
  <g stroke="url(#nerv-orange)" stroke-width="2" fill="none">
    <path d="M 30 50 L 50 50 L 50 70" filter="url(#glow)"/>
    <path d="M 30 50 L 30 70 L 50 70" filter="url(#glow)"/>
  </g>
  <g stroke="url(#nerv-red)" stroke-width="1.5" fill="none">
    <path d="M 35 55 L 45 55 L 45 65" opacity="0.7"/>
    <path d="M 35 55 L 35 65 L 45 65" opacity="0.7"/>
  </g>

  <!-- Clock face -->
  <circle cx="140" cy="160" r="70" fill="none" stroke="url(#nerv-orange)" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="140" cy="160" r="60" fill="none" stroke="#1a2332" stroke-width="1"/>
  
  <!-- Hour markers -->
  <g stroke="#ff6a00" stroke-width="2">
    <line x1="140" y1="100" x2="140" y2="110"/>
    <line x1="140" y1="210" x2="140" y2="220"/>
    <line x1="80" y1="160" x2="90" y2="160"/>
    <line x1="190" y1="160" x2="200" y2="160"/>
  </g>

  <!-- Clock hands -->
  <line x1="140" y1="160" x2="140" y2="120" stroke="#ff6a00" stroke-width="3" stroke-linecap="round" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 140 160" to="360 140 160" dur="12s" repeatCount="indefinite"/>
  </line>
  <line x1="140" y1="160" x2="140" y2="100" stroke="#ff8c00" stroke-width="2" stroke-linecap="round" filter="url(#glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 140 160" to="360 140 160" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- MAGI System indicators -->
  <g transform="translate(55, 235)">
    <rect width="20" height="8" rx="2" fill="#00ff88" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="28" y="7" font-family="monospace" font-size="8" fill="#00ff88">MAGI-01</text>
  </g>
  <g transform="translate(55, 248)">
    <rect width="20" height="8" rx="2" fill="#00ff88" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="28" y="7" font-family="monospace" font-size="8" fill="#00ff88">MAGI-02</text>
  </g>
  <g transform="translate(55, 261)">
    <rect width="20" height="8" rx="2" fill="#00ff88" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="28" y="7" font-family="monospace" font-size="8" fill="#00ff88">MAGI-03</text>
  </g>

  <!-- Right side content -->
  <text x="240" y="85" font-family="sans-serif" font-size="34" font-weight="bold" fill="#ffffff" filter="url(#glow)">NERV Clock</text>
  <rect x="240" y="97" width="140" height="3" rx="1.5" fill="url(#nerv-orange)"/>

  <text x="240" y="128" font-family="sans-serif" font-size="14" fill="#8b949e">Evangelion-Style Clock Widget</text>
  <text x="240" y="148" font-family="sans-serif" font-size="14" fill="#8b949e">for Desktop &amp; Android</text>

  <!-- Features list -->
  <g transform="translate(240, 168)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#ff6a00">▸</text>
    <text x="14" y="0" font-family="monospace" font-size="11" fill="#c9d1d9">Authentic NERV/MAGI aesthetic</text>
  </g>
  <g transform="translate(240, 188)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#ff6a00">▸</text>
    <text x="14" y="0" font-family="monospace" font-size="11" fill="#c9d1d9">Transparent background (always on top)</text>
  </g>
  <g transform="translate(240, 208)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#ff6a00">▸</text>
    <text x="14" y="0" font-family="monospace" font-size="11" fill="#c9d1d9">Desktop (Tauri) + Android widget</text>
  </g>
  <g transform="translate(240, 228)">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#ff6a00">▸</text>
    <text x="14" y="0" font-family="monospace" font-size="11" fill="#c9d1d9">Sync ratio &amp; status indicators</text>
  </g>

  <!-- Platform badges -->
  <g transform="translate(240, 265)">
    <rect width="70" height="22" rx="4" fill="#1a2332" stroke="#3d4450" stroke-width="1"/>
    <text x="35" y="15" font-family="monospace" font-size="10" fill="#c9d1d9" text-anchor="middle">Windows</text>
  </g>
  <g transform="translate(318, 265)">
    <rect width="55" height="22" rx="4" fill="#1a2332" stroke="#3d4450" stroke-width="1"/>
    <text x="27" y="15" font-family="monospace" font-size="10" fill="#c9d1d9" text-anchor="middle">macOS</text>
  </g>
  <g transform="translate(381, 265)">
    <rect width="55" height="22" rx="4" fill="#1a2332" stroke="#3d4450" stroke-width="1"/>
    <text x="27" y="15" font-family="monospace" font-size="10" fill="#c9d1d9" text-anchor="middle">Linux</text>
  </g>
  <g transform="translate(444, 265)">
    <rect width="70" height="22" rx="4" fill="#3DDC84" opacity="0.2" stroke="#3DDC84" stroke-width="1"/>
    <text x="35" y="15" font-family="monospace" font-size="10" fill="#3DDC84" text-anchor="middle">Android</text>
  </g>

  <!-- Tech badges -->
  <g transform="translate(620, 265)">
    <rect width="60" height="22" rx="4" fill="#ffffff" opacity="0.1"/>
    <text x="30" y="15" font-family="monospace" font-size="10" fill="#c9d1d9" text-anchor="middle">Tauri</text>
  </g>
  <g transform="translate(688, 265)">
    <rect width="65" height="22" rx="4" fill="#f97316" opacity="0.2"/>
    <text x="32" y="15" font-family="monospace" font-size="10" fill="#f97316" text-anchor="middle">TypeScript</text>
  </g>
</svg>
