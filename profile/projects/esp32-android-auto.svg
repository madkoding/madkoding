<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#111927"/>
      <stop offset="100%" style="stop-color:#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3ddc84"/>
      <stop offset="100%" style="stop-color="#00c853"/>
    </linearGradient>
    <linearGradient id="wifi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ddc84"/>
      <stop offset="100%" style="stop-color:#009624"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="pulse-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#3ddc84" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with subtle grid -->
  <rect width="800" height="320" rx="12" fill="url(#bg)"/>
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="100" y1="0" x2="100" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="300" y1="0" x2="300" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="500" y1="0" x2="500" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="700" y1="0" x2="700" y2="320"/>
  </g>

  <!-- Connection line -->
  <line x1="80" y1="160" x2="280" y2="160" stroke="#3ddc84" stroke-width="2" stroke-dasharray="5,5" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- Android device (left) -->
  <g transform="translate(180, 160)">
    <rect x="-50" y="-60" width="100" height="120" rx="8" fill="#1a2332" stroke="#3ddc84" stroke-width="2"/>
    <!-- Screen -->
    <rect x="-42" y="-52" width="84" height="60" rx="4" fill="#0d121c"/>
    <!-- WiFi icon on screen -->
    <g transform="translate(0, -30)">
      <path d="M -15 -8 Q -10 -13 -5 -8 M -8 -4 Q -5 -7 -2 -4 M 0 0 L 0 0" stroke="#3ddc84" stroke-width="2" fill="none" stroke-linecap="round">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Android logo hint -->
    <circle cx="-25" cy="35" r="8" fill="none" stroke="#3ddc84" stroke-width="1.5" opacity="0.5"/>
    <circle cx="25" cy="35" r="8" fill="none" stroke="#3ddc84" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ESP32 chip (center) -->
  <g transform="translate(400, 160)">
    <rect x="-60" y="-60" width="120" height="120" rx="8" fill="#1a2332" stroke="url(#accent)" stroke-width="2" filter="url(#glow)">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Chip pins -->
    <g stroke="#5a6b7c" stroke-width="3">
      <line x1="-45" y1="-45" x2="-60" y2="-45"/>
      <line x1="-25" y1="-45" x2="-60" y2="-25"/>
      <line x1="-5" y1="-45" x2="-60" y2="-5"/>
      <line x1="15" y1="-45" x2="-60" y2="15"/>
      <line x1="35" y1="-45" x2="-60" y2="35"/>
      
      <line x1="-45" y1="45" x2="-60" y2="45"/>
      <line x1="-25" y1="45" x2="-60" y2="25"/>
      <line x1="-5" y1="45" x2="-60" y2="5"/>
      <line x1="15" y1="45" x2="-60" y2="-15"/>
      <line x1="35" y1="45" x2="-60" y2="-35"/>
    </g>
    
    <!-- ESP32 label -->
    <text x="0" y="-10" text-anchor="middle" fill="#3ddc84" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="bold">ESP32</text>
    <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="9">WiFi Bridge</text>
    
    <!-- LED indicator -->
    <circle cx="40" cy="40" r="5" fill="#3ddc84" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Car/Auto head unit (right) -->
  <g transform="translate(620, 160)">
    <rect x="-80" y="-50" width="160" height="100" rx="8" fill="#1a2332" stroke="#5a6b7c" stroke-width="2"/>
    <!-- Screen -->
    <rect x="-72" y="-42" width="144" height="70" rx="4" fill="#0d121c"/>
    <!-- Android Auto UI hint -->
    <rect x="-60" y="-30" width="40" height="25" rx="3" fill="#1e293b" opacity="0.6"/>
    <rect x="-15" y="-30" width="40" height="25" rx="3" fill="#1e293b" opacity="0.6"/>
    <rect x="-60" y="0" width="85" height="20" rx="3" fill="#1e293b" opacity="0.4"/>
    <!-- WiFi signal -->
    <g transform="translate(50, -15)">
      <path d="M 0 0 Q -8 -8 -16 0 M -6 0 Q -3 -3 0 0 M 6 0 Q 3 -3 0 0" stroke="url(#wifi)" stroke-width="2.5" fill="none" stroke-linecap="round">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Data packets animation -->
  <circle cx="280" cy="160" r="5" fill="#3ddc84">
    <animate attributeName="cx" from="230" to="340" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="160" r="5" fill="#3ddc84">
    <animate attributeName="cx" from="460" to="540" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#ffffff" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="18" font-weight="bold" filter="url(#glow)">ESP32 Android Auto WiFi</text>
  
  <!-- Subtitle -->
  <text x="400" y="73" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11">IoT WiFi Bridge for Android Auto</text>

  <!-- Tech badges -->
  <g transform="translate(400, 250)" text-anchor="middle">
    <rect x="-120" y="-15" width="60" height="28" rx="6" fill="#1a2332" stroke="#3ddc84" stroke-width="1"/>
    <text x="-90" y="4" fill="#3ddc84" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">C</text>
    
    <rect x="-50" y="-15" width="80" height="28" rx="6" fill="#1a2332" stroke="#00c853" stroke-width="1"/>
    <text x="-10" y="4" fill="#00c853" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">ESP32</text>
    
    <rect x="40" y="-15" width="60" height="28" rx="6" fill="#1a2332" stroke="#94a3b8" stroke-width="1"/>
    <text x="70" y="4" fill="#94a3b8" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="600">IoT</text>
  </g>
</svg>
